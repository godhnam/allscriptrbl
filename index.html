<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALL SCRIPT HUB - SHARE SCRIPT FREE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{
background:radial-gradient(circle at top,#1b0b4f,#050510 60%,#000);
color:#fff;min-height:100vh;overflow-x:hidden;
}
.header{
display:flex;justify-content:space-between;align-items:center;
padding:20px 40px;border-bottom:1px solid rgba(255,255,255,.1)
}
.logo{font-size:28px;font-weight:700}
.logo span{color:#ff4dff}
.online{
padding:10px 20px;border-radius:30px;
background:rgba(0,255,120,.15);border:1px solid #00ff88;
}
.hero{text-align:center;padding:40px 20px}
.hero img{
width:220px;
height:220px;
object-fit:cover;
border-radius:50%;
border:5px solid rgba(255,255,255,.2);
box-shadow:
0 0 20px #00ffff,
0 0 40px #ff00ff,
0 0 60px #00ffff;
filter:drop-shadow(0 0 25px #00e5ff);
animation:float 3s ease-in-out infinite;
}
@keyframes float{50%{transform:translateY(-10px)}}
.title{
font-size:64px;font-weight:800;
background:linear-gradient(90deg,#fff,#ff4dff,#6cf);
-webkit-background-clip:text;color:transparent;
}
.subtitle{font-size:24px;color:#ddd;margin-top:10px}
.features{
display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;padding:30px;max-width:1100px;margin:auto;
}
.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(10px);
padding:20px;border-radius:18px;
box-shadow:0 0 20px rgba(255,0,255,.15);
}
.verify{
max-width:900px;margin:20px auto;padding:30px;
background:rgba(255,255,255,.05);
border-radius:25px;text-align:center;
}
.btn{
display:inline-block;
padding:22px 70px;
font-size:30px;
font-weight:700;
border-radius:20px;
text-decoration:none;
color:#fff;
background:linear-gradient(90deg,#ff00cc,#0066ff);
box-shadow:0 0 30px #6cf;
}
.btn:hover{transform:scale(1.03)}
.stats{
display:grid;grid-template-columns:repeat(4,1fr);
gap:15px;max-width:1000px;margin:30px auto;padding:0 20px;
}
.stat{background:rgba(255,255,255,.05);padding:20px;border-radius:15px;text-align:center}
@media(max-width:700px){
.title{font-size:42px}
.stats{grid-template-columns:repeat(2,1fr)}
.btn{font-size:22px;padding:18px 40px}
}

#langBtn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
background:#6c5ce7;
color:white;
font-weight:bold;
margin-right:15px;
}

</style>
</head>
<body>
<div class="header">
<div class="logo">&lt;/&gt; ALL SCRIPT <span>HUB</span></div>
<button id="langBtn" onclick="toggleLang()">🌐 English</button>
<div class="online">
🟢 ONLINE: <span id="onlineCount">149</span>
</div>

<script>
let users = Math.floor(Math.random() * (350 - 23 + 1)) + 23;

function updateOnline() {

    // Tăng hoặc giảm từ -10 đến +10
    let change = Math.floor(Math.random() * 21) - 10;

    users += change;

    if (users < 23) users = 23;
    if (users > 350) users = 350;

    document.getElementById("onlineCount").textContent = users;
}

updateOnline();

// Cập nhật mỗi 15 giây
setInterval(updateOnline, 15000);
</script>
</div>

<div class="hero">
<img src="executor.png" alt="Executor Logo">
<h1 class="title">SHARE SCRIPT FREE</h1>
<p class="subtitle">t.me/allgamerbl</p>
</div>

<div class="features">
<div class="card"><h3>🛡️ Bảo Mật</h3></div>
<div class="card">
    <h3>⚡ Nhanh Chóng</h3>
</div>
<div class="card"><h3>💎 Miễn Phí</h3></div>
</div>

<div class="verify">
<h2>BẤM VÀO GET SCRIPT</h2>
<br>
<a class="btn" href="https://YOUR-LINK-HERE">🚀 GET SCRIPT</a>
</div>

<div class="stats">
<div class="stat"><h2>25,847+</h2><p>Total Users</p></div>
<div class="stat"><h2>58,392+</h2><p>Script Generated</p></div>
<div class="stat"><h2>62.4%</h2><p>Uptime</p></div>
<div class="stat"><h2>100%</h2><p>Safe</p></div>
</div>

<script>
let currentLang="vi";
function toggleLang(){
if(currentLang==="vi"){
currentLang="en";
document.querySelector(".subtitle").textContent="t.me/allgamerbl";
document.querySelector(".verify h2").textContent="CLICK GET SCRIPT";
document.querySelector(".btn").innerHTML="🚀 GET SCRIPT";
document.querySelector("#langBtn").innerHTML="🌐 Tiếng Việt";

document.querySelectorAll(".card")[0].innerHTML="<h3>🛡️ Security</h3>";
document.querySelectorAll(".card")[1].innerHTML="<h3>⚡ Fast</h3>";
document.querySelectorAll(".card")[2].innerHTML="<h3>💎 Free</h3>";
document.querySelectorAll(".card")[3].innerHTML="<h3>✅ Trusted</h3>";
}else{
currentLang="vi";
document.querySelector(".subtitle").textContent="t.me/allgamerbl";
document.querySelector(".verify h2").textContent="BẤM VÀO GET SCRIPT";
document.querySelector(".btn").innerHTML="🚀 NHẬN SCRIPT";
document.querySelector("#langBtn").innerHTML="🌐 English";

document.querySelectorAll(".card")[0].innerHTML="<h3>🛡️ Bảo Mật</h3>";
document.querySelectorAll(".card")[1].innerHTML="<h3>⚡ Nhanh Chóng</h3>";
document.querySelectorAll(".card")[2].innerHTML="<h3>💎 Miễn Phí</h3>";
document.querySelectorAll(".card")[3].innerHTML="<h3>✅ Uy Tín</h3>";
}
}
</script>

</body>
</html>
