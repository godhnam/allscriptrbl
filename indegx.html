<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Game Scripts</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111827;
padding:30px;
border-radius:20px;
width:700px;
max-width:90%;
box-shadow:0 0 20px rgba(139,92,246,.5);
}

h1{
color:white;
text-align:center;
}

p{
color:#9ca3af;
text-align:center;
}

pre{
background:#0b1220;
padding:15px;
border-radius:10px;
color:#22c55e;
overflow:auto;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#8b5cf6;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#7c3aed;
}
</style>
</head>
<body>

<div class="card">
<h1>🚀 All Script Hub</h1>

<p>Copy script bên dưới</p>

<pre id="script">loadstring(game:HttpGet("loadstring(game:HttpGet("https://api.luarmor.net/files/v3/loaders/fda9babd071d6b536a745774b6bc681c.lua"))()"))()</pre>

<button onclick="copyScript()">📋 Copy Script</button>
</div>

<script>
function copyScript(){
const text=document.getElementById("script").innerText;
navigator.clipboard.writeText(text);
alert("Đã copy script!");
}
</script>

</body>
</html>
